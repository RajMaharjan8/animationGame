<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Games</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        background: linear-gradient(to bottom right,#ffe6ef,#fff7f9);
        overflow-x:hidden;
    }

    /* ============ NAVBAR ============ */
    .navbar{
        width:100%;
        max-width:760px;
        padding:18px 16px 0;
        display:flex;
        justify-content:center;
        gap:10px;
    }

    .tab-btn{
        flex:1;
        max-width:240px;
        padding:14px 18px;
        border:none;
        border-radius:14px 14px 0 0;
        background:#ffd1de;
        color:#a0345c;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
        transition: background .25s ease, color .25s ease, transform .15s ease;
        box-shadow:0 -2px 0 rgba(0,0,0,0.04) inset;
    }

    .tab-btn.active{
        background:#fff;
        color:#ff4f81;
        transform:translateY(-2px);
        box-shadow: 0 -3px 12px rgba(255,79,129,0.18);
    }

    .tab-btn:hover:not(.active){
        background:#ffbecf;
    }

    .tab-content{
        width:100%;
        max-width:760px;
        background:#fff;
        border-radius:0 0 22px 22px;
        padding:22px 18px 28px;
        box-shadow: 0 12px 30px rgba(255,79,129,0.10);
    }

    .panel{
        display:none;
    }
    .panel.active{
        display:block;
    }

    .container{
        text-align:center;
        width:100%;
    }

    h1{
        margin-bottom:8px;
        color:#ff4f81;
        font-size:36px;
    }

    h1.dark{
        color:#222;
    }

    /* ============ KISS GAME ============ */
    .level{
        display:inline-block;
        margin-bottom:6px;
        padding:6px 18px;
        border-radius:30px;
        background:#fff5f8;
        color:#ff4f81;
        font-size:16px;
        font-weight:bold;
        box-shadow:0 3px 10px rgba(255,79,129,0.18);
        transition: transform 0.4s ease, background 0.4s ease, color 0.4s ease;
    }

    .level.pop{
        transform:scale(1.25);
        background:#ff4f81;
        color:#fff;
    }

    .counter{
        font-size:24px;
        margin-bottom:14px;
        color:#444;
        font-weight:bold;
    }

    .best{
        font-size:14px;
        color:#888;
        margin-bottom:16px;
    }

    .scene{
        position:relative;
        width:700px;
        max-width:100%;
        height:410px;
        margin:auto;
        overflow:hidden;
    }

    @keyframes sceneShake{
        0%,100% { transform: translateX(0); }
        20% { transform: translateX(-8px); }
        40% { transform: translateX(8px); }
        60% { transform: translateX(-6px); }
        80% { transform: translateX(6px); }
    }

    .scene.shake{
        animation: sceneShake 0.5s ease;
    }

    .bubble{
        position:absolute;
        top:20px;
        padding:8px 14px;
        background:#fff;
        border-radius:18px;
        font-size:16px;
        color:#ff4f81;
        font-weight:bold;
        box-shadow:0 3px 10px rgba(0,0,0,0.12);
        opacity:0;
        transform: translateY(8px) scale(0.85);
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events:none;
        white-space:nowrap;
    }

    .bubble::after{
        content:"";
        position:absolute;
        bottom:-7px;
        left:24px;
        border:7px solid transparent;
        border-top-color:#fff;
        border-bottom:0;
    }

    .bubble.show{
        opacity:1;
        transform: translateY(0) scale(1);
    }

    .character{
        position:absolute;
        bottom:0;
        transform-origin: bottom center;
        transition: left 1s ease, transform 0.3s ease, opacity 0.3s ease;
    }

    #boy{
        transition: opacity 0.3s ease;
    }

    .boy{
        left:100px;
        height:340px;
        width:auto;
    }

    .girl{
        left:430px;
        height:340px;
        width:auto;
    }

    .girl.move{
        left:210px;
    }

    .boy.excited{
        transform:scale(1.08);
    }

    @keyframes boyJump{
        0%   { transform: translateY(0) scale(1.08); }
        50%  { transform: translateY(-25px) scale(1.10); }
        100% { transform: translateY(0) scale(1.08); }
    }

    .boy.jumping{
        animation: boyJump 0.4s ease 2;
    }

    .heart-eyes{
        position:absolute;
        top:55px;
        right:45px;
        font-size:28px;
        opacity:0;
        transition:0.3s;
    }

    .boy.excited .heart-eyes{
        opacity:1;
    }

    .btn-row{
        margin-top:22px;
        display:flex;
        gap:14px;
        justify-content:center;
        align-items:center;
    }

    button.action{
        padding:14px 35px;
        border:none;
        border-radius:50px;
        background:#ff4f81;
        color:white;
        font-size:18px;
        cursor:pointer;
        transition: transform 0.2s ease, background 0.2s ease;
        box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    button.action:hover:not(:disabled){
        transform:scale(1.05);
        background:#ff2e6d;
    }

    button.action:disabled{
        opacity:0.6;
        cursor:not-allowed;
    }

    button.secondary{
        padding:11px 22px;
        font-size:15px;
        background:#fff;
        color:#ff4f81;
        border:2px solid #ff4f81;
        border-radius:50px;
        cursor:pointer;
        transition: background .2s ease;
    }

    button.secondary:hover:not(:disabled){
        background:#ffe6ef;
    }

    .kiss{
        position:absolute;
        top:150px;
        left:270px;
        font-size:40px;
        opacity:0;
        transition:0.3s;
    }

    .kiss.show{
        opacity:1;
        transform:scale(1.2);
    }

    .floating-heart{
        position:absolute;
        font-size:24px;
        animation:float 2s linear forwards;
        pointer-events:none;
    }

    @keyframes float{
        0%{
            transform:translateY(0) scale(1);
            opacity:1;
        }
        100%{
            transform:translateY(-120px) scale(1.8);
            opacity:0;
        }
    }

    /* ============ HIT GAME ============ */
    .hit-stage{
        position:relative;
        width:520px;
        max-width:100%;
        height:520px;
        margin:8px auto 0;
        background: radial-gradient(ellipse at 50% 92%, rgba(255,180,205,0.45) 0%, rgba(255,255,255,0) 60%);
        border-radius:18px;
        overflow:hidden;
        cursor:pointer;
        user-select:none;
        -webkit-user-select:none;
    }

    /* keep content visually centered */
    .hit-floor{
        position:absolute;
        bottom:14px;
        left:50%;
        width:340px;
        height:18px;
        transform: translateX(-50%);
        background: radial-gradient(ellipse, rgba(0,0,0,0.18), rgba(0,0,0,0));
        filter: blur(2px);
        transition: width .25s ease, opacity .25s ease;
    }

    .boy-h-wrap{
        position:absolute;
        left:50%;
        bottom:40px;
        transform: translateX(-50%);
        height:430px;
        transform-origin: 50% 100%;
        will-change: transform, filter;
    }

    .boy-h{
        height:100%;
        width:auto;
        display:block;
        pointer-events:none;
        filter: drop-shadow(0 14px 14px rgba(0,0,0,0.18));
        transition: opacity .12s ease;
    }

    /* a soft red flash overlay on the face during hit */
    .face-flash{
        position:absolute;
        top:6%;
        left:50%;
        transform: translateX(-50%);
        width:60%;
        height:34%;
        border-radius:50%;
        background: radial-gradient(circle, rgba(255,60,60,0.55), rgba(255,60,60,0) 70%);
        opacity:0;
        pointer-events:none;
        mix-blend-mode: multiply;
    }

    .face-flash.show{
        animation: faceFlash .55s ease forwards;
    }

    @keyframes faceFlash{
        0%   { opacity: 0; transform: translateX(-50%) scale(.6); }
        25%  { opacity: 1; transform: translateX(-50%) scale(1.05); }
        100% { opacity: 0; transform: translateX(-50%) scale(1.2); }
    }

    /* "POW!" comic text */
    .pow{
        position:absolute;
        font-family: "Impact", "Arial Black", sans-serif;
        font-size:38px;
        color:#ffeb3b;
        text-shadow:
            -2px -2px 0 #d32f2f,
             2px -2px 0 #d32f2f,
            -2px  2px 0 #d32f2f,
             2px  2px 0 #d32f2f,
             0 6px 12px rgba(0,0,0,0.35);
        pointer-events:none;
        transform-origin: center;
        animation: powAnim .55s ease forwards;
        letter-spacing: 1px;
    }

    @keyframes powAnim{
        0%   { transform: translate(-50%,-50%) scale(.2) rotate(-20deg); opacity:0; }
        30%  { transform: translate(-50%,-50%) scale(1.25) rotate(-10deg); opacity:1; }
        70%  { transform: translate(-50%,-60%) scale(1.1) rotate(-6deg); opacity:1; }
        100% { transform: translate(-50%,-90%) scale(.9) rotate(-2deg); opacity:0; }
    }

    /* impact star burst at click point */
    .impact{
        position:absolute;
        width:90px;
        height:90px;
        pointer-events:none;
        transform: translate(-50%,-50%);
        animation: impactPop .5s ease forwards;
    }

    @keyframes impactPop{
        0%   { transform: translate(-50%,-50%) scale(.2) rotate(0); opacity:0; }
        25%  { transform: translate(-50%,-50%) scale(1.0) rotate(15deg); opacity:1; }
        100% { transform: translate(-50%,-50%) scale(1.6) rotate(35deg); opacity:0; }
    }

    .impact::before, .impact::after{
        content:"";
        position:absolute;
        inset:0;
        background:
            radial-gradient(circle at center, #fff 0 8%, rgba(255,235,59,0.95) 9% 18%, rgba(255,235,59,0) 60%),
            conic-gradient(from 0deg, transparent 0 20deg, #ffeb3b 20deg 30deg, transparent 30deg 65deg,
                           #ffeb3b 65deg 75deg, transparent 75deg 110deg, #ffeb3b 110deg 120deg,
                           transparent 120deg 155deg, #ffeb3b 155deg 165deg, transparent 165deg 200deg,
                           #ffeb3b 200deg 210deg, transparent 210deg 245deg, #ffeb3b 245deg 255deg,
                           transparent 255deg 290deg, #ffeb3b 290deg 300deg, transparent 300deg 335deg,
                           #ffeb3b 335deg 345deg, transparent 345deg 360deg);
        -webkit-mask: radial-gradient(circle at center, #000 22%, transparent 22%);
                mask: radial-gradient(circle at center, #000 22%, transparent 22%);
        filter: drop-shadow(0 0 6px rgba(255,180,40,0.7));
    }

    .impact::after{
        background:
            radial-gradient(circle at center, #fff 0 18%, rgba(255,255,255,0) 30%);
        -webkit-mask: none;
                mask: none;
    }

    /* ripple ring under the click */
    .ripple{
        position:absolute;
        width:30px;
        height:30px;
        border-radius:50%;
        border:3px solid rgba(255,255,255,0.85);
        transform: translate(-50%,-50%);
        pointer-events:none;
        animation: ripple .6s ease-out forwards;
    }

    @keyframes ripple{
        0%   { opacity:.9; transform: translate(-50%,-50%) scale(.4); }
        100% { opacity:0;  transform: translate(-50%,-50%) scale(3.2); }
    }

    /* sweat drop falling */
    .sweat{
        position:absolute;
        width:14px;
        height:18px;
        background: linear-gradient(180deg, #b6e2ff, #6db8ef);
        border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
        transform: translateX(-50%);
        pointer-events:none;
        box-shadow: inset 2px 2px 0 rgba(255,255,255,0.6);
        animation: sweatFall 1.4s ease-in forwards;
    }

    @keyframes sweatFall{
        0%   { opacity:0; transform: translate(-50%, -10px) scale(.6); }
        15%  { opacity:1; transform: translate(-50%, 0) scale(1); }
        100% { opacity:0; transform: translate(-50%, 360px) scale(.9); }
    }

    /* tear drop running down face */
    .tear{
        position:absolute;
        width:10px;
        height:14px;
        background: linear-gradient(180deg, #e6f4ff 0%, #9ed3f5 60%, #4ea3e0 100%);
        border-radius:50% 50% 50% 50% / 65% 65% 35% 35%;
        transform: translateX(-50%);
        pointer-events:none;
        box-shadow:
            inset 2px 2px 0 rgba(255,255,255,0.85),
            0 0 6px rgba(120,180,230,0.55);
        animation: tearDrip 1.5s cubic-bezier(.45,0,.55,1) forwards;
        opacity:0;
        z-index:5;
    }

    @keyframes tearDrip{
        0%   { opacity:0; transform: translate(-50%, 0)    scale(.5, .5); }
        10%  { opacity:1; transform: translate(-50%, 4px)  scale(1, 1); }
        30%  { opacity:1; transform: translate(-50%, 30px) scale(.95, 1.15); }
        70%  { opacity:1; transform: translate(-50%,140px) scale(.9, 1.25); }
        100% { opacity:0; transform: translate(-50%,300px) scale(.8, 1.35); }
    }

    /* hit feedback shake/tilt classes */
    @keyframes hitShakeLeft{
        0%   { transform: translateX(-50%) rotate(0deg) translateZ(0); }
        12%  { transform: translateX(calc(-50% - 18px)) rotate(-9deg); }
        28%  { transform: translateX(calc(-50% + 6px)) rotate(4deg); }
        44%  { transform: translateX(calc(-50% - 8px)) rotate(-3deg); }
        62%  { transform: translateX(calc(-50% + 3px)) rotate(2deg); }
        100% { transform: translateX(-50%) rotate(0deg); }
    }

    @keyframes hitShakeRight{
        0%   { transform: translateX(-50%) rotate(0deg); }
        12%  { transform: translateX(calc(-50% + 18px)) rotate(9deg); }
        28%  { transform: translateX(calc(-50% - 6px)) rotate(-4deg); }
        44%  { transform: translateX(calc(-50% + 8px)) rotate(3deg); }
        62%  { transform: translateX(calc(-50% - 3px)) rotate(-2deg); }
        100% { transform: translateX(-50%) rotate(0deg); }
    }

    @keyframes hitShakeCenter{
        0%   { transform: translateX(-50%) translateY(0) scale(1); }
        10%  { transform: translateX(-50%) translateY(6px) scale(.97); }
        25%  { transform: translateX(calc(-50% - 6px)) translateY(2px) scale(1.01) rotate(-2deg); }
        40%  { transform: translateX(calc(-50% + 6px)) translateY(2px) scale(1.01) rotate(2deg); }
        55%  { transform: translateX(calc(-50% - 4px)) translateY(0) scale(1) rotate(-1deg); }
        70%  { transform: translateX(calc(-50% + 3px)) translateY(0) scale(1) rotate(1deg); }
        100% { transform: translateX(-50%) translateY(0) scale(1) rotate(0); }
    }

    .boy-h-wrap.hitL{ animation: hitShakeLeft .35s cubic-bezier(.25,.8,.25,1); }
    .boy-h-wrap.hitR{ animation: hitShakeRight .35s cubic-bezier(.25,.8,.25,1); }
    .boy-h-wrap.hitC{ animation: hitShakeCenter .42s cubic-bezier(.25,.8,.25,1); }

    /* whole stage shakes too */
    @keyframes stageShakeMild{
        0%,100%{ transform: translateX(0) translateY(0); }
        20% { transform: translateX(-4px) translateY(2px); }
        40% { transform: translateX(4px) translateY(-1px); }
        60% { transform: translateX(-3px) translateY(1px); }
        80% { transform: translateX(2px) translateY(-1px); }
    }

    @keyframes stageShakeBig{
        0%,100%{ transform: translateX(0) translateY(0) rotate(0); }
        15% { transform: translateX(-9px) translateY(4px) rotate(-.4deg); }
        30% { transform: translateX(9px) translateY(-3px) rotate(.4deg); }
        45% { transform: translateX(-6px) translateY(3px); }
        60% { transform: translateX(5px) translateY(-2px); }
        80% { transform: translateX(-3px) translateY(1px); }
    }

    .hit-stage.shakeMild{ animation: stageShakeMild .35s ease; }
    .hit-stage.shakeBig  { animation: stageShakeBig  .55s ease; }

    /* HUD on hit game */
    .hud{
        display:flex;
        justify-content:space-between;
        align-items:center;
        max-width:520px;
        width:100%;
        margin: 4px auto 6px;
        padding: 0 6px;
        gap: 12px;
    }

    .stat{
        background:#fff5f8;
        border-radius:14px;
        padding:8px 14px;
        font-weight:bold;
        color:#444;
        box-shadow: 0 4px 10px rgba(255,79,129,0.10);
        font-size:14px;
        flex:1;
        text-align:center;
    }

    .stat .num{
        color:#ff4f81;
        font-size:18px;
        margin-left:4px;
    }

    .mood-bar{
        width:100%;
        max-width:520px;
        height:10px;
        background:#fff5f8;
        border-radius:8px;
        overflow:hidden;
        margin: 8px auto 4px;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
    }

    .mood-fill{
        height:100%;
        width:0%;
        background: linear-gradient(90deg, #7ad97a, #ffd95e 50%, #ff5470);
        transition: width .4s ease;
    }

    .mood-label{
        font-size:13px;
        color:#888;
        margin-bottom:8px;
    }

    /* zone hint highlights when hovering */
    .zone-hint{
        position:absolute;
        top:14%;
        height:46%;
        pointer-events:none;
        opacity:0;
        transition: opacity .2s ease;
        border-radius:50% / 30%;
        background: radial-gradient(circle, rgba(255,255,255,.55), rgba(255,255,255,0) 70%);
    }

    .hit-stage:hover .zone-hint{ opacity:.55; }

    .zone-hint.zL{ left:18%; width:22%; }
    .zone-hint.zC{ left:40%; width:20%; top:8%; height:34%; }
    .zone-hint.zR{ left:60%; width:22%; }

    /* crying overlay vignette */
    .stage-cry-tint{
        position:absolute;
        inset:0;
        background: radial-gradient(ellipse at center, rgba(80,140,200,0.0), rgba(80,140,200,0.15) 75%);
        pointer-events:none;
        opacity:0;
        transition: opacity .8s ease;
    }
    .hit-stage.crying .stage-cry-tint{ opacity:1; }

    /* sobbing motion when crying */
    @keyframes sob{
        0%,100% { transform: translateX(-50%) translateY(0) scale(1); }
        50%     { transform: translateX(-50%) translateY(-6px) scale(1.01); }
    }
    .boy-h-wrap.sobbing{ animation: sob 1.4s ease-in-out infinite; }

    /* small footer note */
    .hint{
        margin-top:14px;
        font-size:13px;
        color:#888;
    }

    @media(max-width:768px){
        .scene{
            width:100%;
            height:360px;
        }
        .boy{ left:20px; height:290px; }
        .girl{ left:220px; height:290px; }
        .girl.move{ left:90px; }
        .kiss{ top:140px; left:160px; }

        .hit-stage{ height:480px; }
        .boy-h-wrap{ height:380px; bottom:30px; }
        h1{ font-size:30px; }
    }

</style>
</head>

<body>

<!-- ===================== NAVBAR ===================== -->
<nav class="navbar">
    <button class="tab-btn active" data-tab="A">A • Kiss 💋</button>
    <button class="tab-btn"        data-tab="B">B • Hit 👋</button>
</nav>

<div class="tab-content">

    <!-- ===================== TAB A : KISS GAME ===================== -->
    <section class="panel active" id="panelA">
        <div class="container">

            <h1>💖 Kiss Counter 💖</h1>

            <div class="level" id="level">Strangers 👋</div>

            <div class="counter">
                Total Kisses: <span id="count">0</span>
            </div>

            <div class="best">Best streak: <span id="best">0</span></div>

            <div class="scene" id="scene">

                <img class="character girl" id="girl" src="girl.png" />

                <div class="character boy" id="boy-wrapper">
                    <img class="boy" id="boy" src="boy.png" />
                    <div class="heart-eyes">😍</div>
                </div>

                <div class="kiss" id="kiss">💋</div>
                <div class="bubble" id="bubble"></div>

            </div>

            <div class="btn-row">
                <button id="kissBtn" class="action">Kiss Him 💋</button>
                <button id="resetBtn" class="secondary">Reset</button>
            </div>

        </div>
    </section>

    <!-- ===================== TAB B : HIT GAME ===================== -->
    <section class="panel" id="panelB">
        <div class="container">

            <h1 class="dark">👋 Slap Reaction 👋</h1>

            <div class="hud">
                <div class="stat">Hits<span class="num" id="hHits">0</span></div>
                <div class="stat">Combo<span class="num" id="hCombo">0</span></div>
                <div class="stat">Best<span class="num" id="hBest">0</span></div>
            </div>

            <div class="mood-bar"><div class="mood-fill" id="moodFill"></div></div>
            <div class="mood-label" id="moodLabel">He's calm. Tap his face — left, right, or center.</div>

            <div class="hit-stage" id="hitStage">
                <div class="zone-hint zL"></div>
                <div class="zone-hint zC"></div>
                <div class="zone-hint zR"></div>

                <div class="boy-h-wrap" id="boyHWrap">
                    <img class="boy-h" id="boyH" src="boy_neutral.png" alt="boy" draggable="false" />
                    <div class="face-flash" id="faceFlash"></div>
                </div>

                <div class="hit-floor" id="hitFloor"></div>
                <div class="stage-cry-tint"></div>
            </div>

            <div class="btn-row">
                <button id="calmBtn" class="action">Calm Him Down 🤗</button>
                <button id="hResetBtn" class="secondary">Reset</button>
            </div>

            <div class="hint">Tip: hit the same spot fast for combos. Too many hits and he'll cry.</div>
        </div>
    </section>

</div>

<script>
/* =====================================================================
   TABS
===================================================================== */
const tabBtns = document.querySelectorAll(".tab-btn");
const panels  = document.querySelectorAll(".panel");

tabBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.toggle("active", b === btn));
        panels.forEach(p => p.classList.toggle("active", p.id === "panel" + tab));
    });
});

/* =====================================================================
   AUDIO HELPER  (synthesized so no asset files are needed)
===================================================================== */
let audioCtx = null;
function ac(){
    if (!audioCtx){
        const Ctor = window.AudioContext || window.webkitAudioContext;
        if (Ctor) audioCtx = new Ctor();
    }
    return audioCtx;
}

function playSlap(power){
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const dur = 0.18 + power * 0.05;
    // white-noise burst -> bandpass for a 'thwack'
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++){
        const env = Math.exp(-i / (ctx.sampleRate * (0.04 + power * 0.02)));
        ch[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 1200 - power * 200;
    bp.Q.value = 0.9;
    const gain = ctx.createGain();
    gain.gain.value = 0.55 + power * 0.15;
    src.connect(bp).connect(gain).connect(ctx.destination);
    src.start(t0);

    // low thump for body
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.frequency.setValueAtTime(160 - power * 30, t0);
    osc.frequency.exponentialRampToValueAtTime(50, t0 + 0.18);
    og.gain.setValueAtTime(0.4 + power * 0.1, t0);
    og.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
    osc.connect(og).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + 0.25);
}

function playSob(){
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    // sweeping whimper using two oscillators
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(420, t0);
    osc.frequency.linearRampToValueAtTime(620, t0 + 0.18);
    osc.frequency.linearRampToValueAtTime(360, t0 + 0.45);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.18, t0 + 0.05);
    g.gain.linearRampToValueAtTime(0, t0 + 0.55);
    const vibrato = ctx.createOscillator();
    const vg = ctx.createGain();
    vibrato.frequency.value = 6;
    vg.gain.value = 18;
    vibrato.connect(vg).connect(osc.frequency);
    vibrato.start(t0); vibrato.stop(t0 + 0.6);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + 0.6);
}

/* ----- Kiss-game sounds ----- */
function playKiss(){
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    // Lip-pucker noise: short bandpass burst that sweeps up — a "muah".
    const dur = 0.22;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++){
        const env = Math.exp(-i / (ctx.sampleRate * 0.06));
        ch[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.setValueAtTime(700, t0);
    bp.frequency.linearRampToValueAtTime(2200, t0 + 0.14);
    bp.Q.value = 6;
    const ng = ctx.createGain();
    ng.gain.value = 0.35;
    src.connect(bp).connect(ng).connect(ctx.destination);
    src.start(t0);

    // tiny tonal "smack" body so it isn't pure noise
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(380, t0);
    osc.frequency.exponentialRampToValueAtTime(950, t0 + 0.09);
    og.gain.setValueAtTime(0.0001, t0);
    og.gain.exponentialRampToValueAtTime(0.22, t0 + 0.02);
    og.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.2);
    osc.connect(og).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + 0.22);
}

function playStep(power){
    power = power || 0.25;
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const dur = 0.09;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++){
        const env = Math.exp(-i / (ctx.sampleRate * 0.018));
        ch[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 380;
    const g = ctx.createGain();
    g.gain.value = power;
    src.connect(lp).connect(g).connect(ctx.destination);
    src.start(t0);
}

function playSparkle(){
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = "sine";
    const base = 1500 + Math.random() * 600;
    osc.frequency.setValueAtTime(base, t0);
    osc.frequency.exponentialRampToValueAtTime(base * 1.7, t0 + 0.12);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.08, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + 0.25);
}

function playChime(){
    // little C-major arpeggio when the level changes
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        const start = t0 + i * 0.07;
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.18, start + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.5);
        osc.connect(g).connect(ctx.destination);
        osc.start(start); osc.stop(start + 0.55);
    });
}

function playFanfare(){
    // bigger celebration on every 10th kiss (milestone)
    const ctx = ac(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const seq = [
        [523.25, 0.00], [659.25, 0.10], [783.99, 0.20],
        [1046.5, 0.32], [1318.5, 0.44], [1567.98, 0.58],
    ];
    seq.forEach(([freq, dt]) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        const start = t0 + dt;
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.22, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.55);
        osc.connect(g).connect(ctx.destination);
        osc.start(start); osc.stop(start + 0.6);
    });
}

/* =====================================================================
   KISS GAME (existing, kept intact)
===================================================================== */
const STORAGE_KEY = "kissCounterState";
const button = document.getElementById("kissBtn");
const resetBtn = document.getElementById("resetBtn");
const girl = document.getElementById("girl");
const boy = document.getElementById("boy");
const boyWrapper = document.getElementById("boy-wrapper");
const kiss = document.getElementById("kiss");
const counter = document.getElementById("count");
const bestEl = document.getElementById("best");
const levelEl = document.getElementById("level");
const bubble = document.getElementById("bubble");
const scene = document.getElementById("scene");

const LEVELS = [
    { min: 0,   title: "Strangers 👋" },
    { min: 1,   title: "First Spark ✨" },
    { min: 5,   title: "Crushing 💗" },
    { min: 10,  title: "Lovebirds 💕" },
    { min: 25,  title: "Sweethearts 💖" },
    { min: 50,  title: "Soulmates 💞" },
    { min: 100, title: "Forever 💍" },
];

const PHRASES = [
    "I love you ❤️", "Mwah! 💋", "You're the best 🥰",
    "My heart! 💗", "Again? 😘", "Forever yours ✨",
    "So warm 🌸", "Cutie 💕",
];

let count = 0, best = 0;

function load(){
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw){
            const s = JSON.parse(raw);
            count = s.count || 0;
            best = s.best || 0;
        }
    } catch (e) {}
    counter.innerText = count;
    bestEl.innerText = best;
    levelEl.innerText = levelFor(count);
}

function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ count, best }));
}

function levelFor(n){
    let title = LEVELS[0].title;
    for (const lv of LEVELS){ if (n >= lv.min) title = lv.title; }
    return title;
}

function updateLevel(){
    const newTitle = levelFor(count);
    if (levelEl.innerText !== newTitle){
        levelEl.innerText = newTitle;
        levelEl.classList.add("pop");
        setTimeout(() => levelEl.classList.remove("pop"), 600);
        playChime();
    }
}

function showBubble(){
    bubble.innerText = PHRASES[Math.floor(Math.random() * PHRASES.length)];
    const sceneRect = scene.getBoundingClientRect();
    bubble.style.left = (sceneRect.width < 500 ? 30 : 110) + "px";
    bubble.classList.add("show");
    setTimeout(() => bubble.classList.remove("show"), 1500);
}

button.addEventListener("click", () => {
    // unlock audio context on user gesture
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();

    button.disabled = true;
    girl.classList.add("move");

    // footsteps as the girl walks toward the boy (over the 1s travel)
    [180, 430, 720].forEach((ms, i) =>
        setTimeout(() => playStep(0.22 + i * 0.04), ms));

    setTimeout(() => {
        kiss.classList.add("show");
        boyWrapper.classList.add("excited");
        swapImg(boy, "boyexpression.png");
        playKiss();

        count++;
        if (count > best) best = count;
        counter.innerText = count;
        bestEl.innerText = best;
        updateLevel();
        save();

        const milestone = count > 0 && count % 10 === 0;
        const burstCount = milestone ? 14 : 1;
        for (let i = 0; i < burstCount; i++){
            setTimeout(() => createHeart(milestone), i * 60);
        }
        if (milestone){
            scene.classList.add("shake");
            setTimeout(() => scene.classList.remove("shake"), 500);
            setTimeout(playFanfare, 120);
        } else {
            // soft sparkle on a normal kiss
            setTimeout(playSparkle, 80);
        }
        showBubble();
    }, 1000);

    setTimeout(() => boyWrapper.classList.add("jumping"), 1350);
    setTimeout(() => boyWrapper.classList.remove("jumping"), 2200);

    setTimeout(() => {
        kiss.classList.remove("show");
        boyWrapper.classList.remove("excited");
        swapImg(boy, "boy.png");
    }, 2400);

    setTimeout(() => {
        girl.classList.remove("move");
        swapImg(girl, "girlexpression.png");
    }, 2700);

    // footsteps as she walks back
    [2880, 3120, 3360].forEach((ms, i) =>
        setTimeout(() => playStep(0.18 + i * 0.03), ms));

    setTimeout(() => swapImg(girl, "girl.png"), 3700);
    setTimeout(() => button.disabled = false, 4200);
});

resetBtn.addEventListener("click", () => {
    if (!confirm("Reset kiss count?")) return;
    count = 0;
    counter.innerText = count;
    levelEl.innerText = levelFor(count);
    save();
});

function swapImg(imgEl, newSrc){
    imgEl.style.opacity = "0";
    setTimeout(() => {
        imgEl.src = newSrc;
        imgEl.style.opacity = "1";
    }, 250);
}

const HEART_EMOJIS = ["💖", "💕", "💗", "💘", "💞", "❤️", "✨"];

function createHeart(big){
    const heart = document.createElement("div");
    heart.classList.add("floating-heart");
    heart.innerHTML = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
    const sceneW = scene.clientWidth;
    const spread = big ? sceneW * 0.7 : 100;
    const baseX = big ? sceneW * 0.15 : 250;
    heart.style.left = (baseX + Math.random() * spread) + "px";
    heart.style.top = (100 + Math.random() * 40) + "px";
    if (big) heart.style.fontSize = (24 + Math.random() * 18) + "px";
    scene.appendChild(heart);
    setTimeout(() => heart.remove(), 2000);
}

load();

/* =====================================================================
   HIT GAME
===================================================================== */
const hitStage  = document.getElementById("hitStage");
const boyH      = document.getElementById("boyH");
const boyHWrap  = document.getElementById("boyHWrap");
const faceFlash = document.getElementById("faceFlash");
const hitFloor  = document.getElementById("hitFloor");
const hHits     = document.getElementById("hHits");
const hCombo    = document.getElementById("hCombo");
const hBestEl   = document.getElementById("hBest");
const moodFill  = document.getElementById("moodFill");
const moodLabel = document.getElementById("moodLabel");
const calmBtn   = document.getElementById("calmBtn");
const hResetBtn = document.getElementById("hResetBtn");

const HIT_KEY = "hitGameState";
const CRY_THRESHOLD = 25;    // mood units to trigger crying (raised: takes way more hits)
const COOLDOWN_MS   = 35;    // very low — slap reacts almost instantly
const CRY_LOCK_MS   = 2500;  // can't hit during crying

const IMG = {
    neutral: "boy_neutral.png",
    hitL:    "boy_hit_left.png",   // hand from left -> his left cheek
    hitR:    "boy_hit_right.png",  // hand from right -> his right cheek
    hitC:    "boy_hit_center.png",
    cry:     "boy_cry.png",
};

// preload images so swapping is instant
Object.values(IMG).forEach(s => { const i = new Image(); i.src = s; });

let mood = 0;          // 0 = calm, CRY_THRESHOLD = bawling
let totalHits = 0;
let combo = 0;
let bestCombo = 0;
let lastHitTime = 0;
let lastZone = null;
let isCrying = false;
let resetExpressionTimer = null;
let comboResetTimer = null;
let tearTimer = null;

function loadHit(){
    try {
        const raw = localStorage.getItem(HIT_KEY);
        if (raw){
            const s = JSON.parse(raw);
            bestCombo = s.bestCombo || 0;
        }
    } catch (e) {}
    hBestEl.innerText = bestCombo;
    refreshHud();
}

function saveHit(){
    localStorage.setItem(HIT_KEY, JSON.stringify({ bestCombo }));
}

function refreshHud(){
    hHits.innerText  = totalHits;
    hCombo.innerText = combo;
    hBestEl.innerText = bestCombo;
    const pct = Math.min(100, (mood / CRY_THRESHOLD) * 100);
    moodFill.style.width = pct + "%";
    if (isCrying){
        moodLabel.innerText = "He's crying 😢 — give him a hug.";
    } else if (mood >= CRY_THRESHOLD - 2){
        moodLabel.innerText = "He looks ready to cry…";
    } else if (mood >= CRY_THRESHOLD / 2){
        moodLabel.innerText = "He's getting upset.";
    } else if (mood > 0){
        moodLabel.innerText = "Ouch! Tap him again — left, right, center.";
    } else {
        moodLabel.innerText = "He's calm. Tap his face — left, right, or center.";
    }
}

function setExpression(src){
    if (boyH.src.endsWith(src)) return;
    boyH.src = src;            // instant swap — no fade, snappier reaction
    boyH.style.opacity = "1";
}

function spawnAt(cls, x, y, html=""){
    const el = document.createElement("div");
    el.className = cls;
    el.style.left = x + "px";
    el.style.top  = y + "px";
    if (html) el.innerHTML = html;
    hitStage.appendChild(el);
    return el;
}

function spawnImpact(x, y){
    const i = spawnAt("impact", x, y);
    setTimeout(() => i.remove(), 600);
    const r = spawnAt("ripple", x, y);
    setTimeout(() => r.remove(), 700);
}

function spawnPow(x, y, text){
    const p = spawnAt("pow", x, y, text);
    p.style.transform = "translate(-50%,-50%)";
    setTimeout(() => p.remove(), 700);
}

function spawnSweat(x, y){
    const s = spawnAt("sweat", x, y);
    setTimeout(() => s.remove(), 1500);
}

function spawnTearStream(){
    // continuous tears dripping from each eye while crying.
    // eye coords were measured from boy_cry.png (331x489):
    //   left eye  center ≈ (0.40, 0.235)
    //   right eye center ≈ (0.60, 0.235)
    if (tearTimer) clearInterval(tearTimer);
    const drip = () => {
        if (!isCrying) return;
        const stageRect = hitStage.getBoundingClientRect();
        const wrapRect  = boyHWrap.getBoundingClientRect();
        const baseLx = wrapRect.left - stageRect.left + wrapRect.width * 0.40;
        const baseRx = wrapRect.left - stageRect.left + wrapRect.width * 0.60;
        const baseY  = wrapRect.top  - stageRect.top  + wrapRect.height * 0.235;
        // a tiny random jitter so the stream looks alive
        const jx = () => (Math.random() - 0.5) * 4;
        const tL = spawnAt("tear", baseLx + jx(), baseY);
        const tR = spawnAt("tear", baseRx + jx(), baseY);
        setTimeout(() => { tL.remove(); tR.remove(); }, 1700);
    };
    drip();
    tearTimer = setInterval(drip, 220);   // faster drips → real crying feel
}

function stopTearStream(){
    if (tearTimer){ clearInterval(tearTimer); tearTimer = null; }
}

function getZoneFromClick(e){
    const rect = boyHWrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const inFace = y >= 0 && y < rect.height * 0.55;
    if (!inFace) return null;
    const xRatio = x / rect.width;
    if (xRatio < 0.36) return { zone: "L", img: IMG.hitL,
        wrapClass: "hitL", powText: "SLAP!", power: 0 };
    if (xRatio > 0.64) return { zone: "R", img: IMG.hitR,
        wrapClass: "hitR", powText: "SMACK!", power: 0 };
    return { zone: "C", img: IMG.hitC,
        wrapClass: "hitC", powText: "POW!", power: 1 };
}

function triggerHit(e){
    if (isCrying) return;
    const now = performance.now();
    if (now - lastHitTime < COOLDOWN_MS) return;
    lastHitTime = now;

    const stageRect = hitStage.getBoundingClientRect();
    const localX = e.clientX - stageRect.left;
    const localY = e.clientY - stageRect.top;

    const info = getZoneFromClick(e);
    if (!info){
        // off-face click -> no reaction
        return;
    }

    // counters / combo
    totalHits++;
    if (info.zone === lastZone) combo++; else combo = 1;
    lastZone = info.zone;
    if (combo > bestCombo){ bestCombo = combo; saveHit(); }

    // mood worsens. center hits hurt more.
    mood = Math.min(CRY_THRESHOLD, mood + (info.zone === "C" ? 1.6 : 1));

    // visuals
    setExpression(info.img);

    // restart wrap animation
    boyHWrap.classList.remove("hitL","hitR","hitC","sobbing");
    void boyHWrap.offsetWidth;
    boyHWrap.classList.add(info.wrapClass);

    // face flash
    faceFlash.classList.remove("show");
    void faceFlash.offsetWidth;
    faceFlash.classList.add("show");

    // stage shake
    hitStage.classList.remove("shakeMild","shakeBig");
    void hitStage.offsetWidth;
    hitStage.classList.add(info.zone === "C" ? "shakeBig" : "shakeMild");

    // impact + comic text at click point
    spawnImpact(localX, localY);
    spawnPow(localX, localY - 24, info.powText);


    playSlap(info.power);

    // schedule expression reset back to neutral (unless we cry first)
    if (resetExpressionTimer) clearTimeout(resetExpressionTimer);
    resetExpressionTimer = setTimeout(() => {
        if (!isCrying) setExpression(IMG.neutral);
    }, 650);

    // combo decays after a quiet moment
    if (comboResetTimer) clearTimeout(comboResetTimer);
    comboResetTimer = setTimeout(() => {
        combo = 0; lastZone = null; refreshHud();
    }, 1400);

    if (mood >= CRY_THRESHOLD) goCry();
    refreshHud();
}

function goCry(){
    isCrying = true;
    setExpression(IMG.cry);
    boyHWrap.classList.remove("hitL","hitR","hitC");
    void boyHWrap.offsetWidth;
    boyHWrap.classList.add("sobbing");
    hitStage.classList.add("crying");
    playSob();
    // soft "auto-recover" sob ticks
    const sobLoop = setInterval(() => {
        if (!isCrying){ clearInterval(sobLoop); return; }
        playSob();
    }, 1700);
    refreshHud();

    // user must press Calm OR after CRY_LOCK_MS we soften back to neutral
    setTimeout(() => {
        if (isCrying){
            // remain crying — user has to calm him.
        }
    }, CRY_LOCK_MS);
}

function calmDown(){
    if (!isCrying && mood === 0) return;
    isCrying = false;
    mood = 0;
    combo = 0;
    lastZone = null;
    boyHWrap.classList.remove("sobbing","hitL","hitR","hitC");
    hitStage.classList.remove("crying","shakeMild","shakeBig");
    stopTearStream();
    setExpression(IMG.neutral);
    refreshHud();
}

hitStage.addEventListener("click", (e) => {
    // ensure audio context is unlocked by user gesture
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    triggerHit(e);
});

calmBtn.addEventListener("click", calmDown);

hResetBtn.addEventListener("click", () => {
    if (!confirm("Reset hit stats?")) return;
    totalHits = 0; combo = 0; bestCombo = 0; mood = 0;
    isCrying = false; lastZone = null;
    boyHWrap.classList.remove("sobbing","hitL","hitR","hitC");
    hitStage.classList.remove("crying","shakeMild","shakeBig");
    stopTearStream();
    setExpression(IMG.neutral);
    saveHit();
    refreshHud();
});

loadHit();
